<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PDA App">
<meta name="theme-color" content="#1A6FC4">
<title>Registro PDA</title>
<link rel="manifest" id="manifest-placeholder">
<link rel="apple-touch-icon" href="https://victortlacerda.github.io/app-pda/icone.png">
<link rel="icon" type="image/png" href="https://victortlacerda.github.io/app-pda/icone.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f5f0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px}
.app{max-width:480px;margin:0 auto;padding:1rem;padding-bottom:2rem}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.hicon{width:38px;height:38px;border-radius:10px;background:#1A6FC4;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hicon svg{display:block}
.header h2{font-size:17px;font-weight:600;color:#111}
.header p{font-size:12px;color:#888}
label{display:block;font-size:13px;color:#666;margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
input,select{width:100%;font-size:16px;padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#f9f9f7;color:#111;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:#1A6FC4;background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px}
.btn-primary{background:#1A6FC4;color:#fff}
.btn-secondary{background:#f0f0ed;color:#333;border:1px solid #ddd}
.btn-excel{background:#217346;color:#fff}
.btn-pdf{background:#C0392B;color:#fff}
.hint{font-size:11px;color:#aaa;margin-top:3px}
.sep{display:flex;align-items:center;gap:8px;margin:14px 0 4px;font-size:12px;color:#bbb}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:#eee}
.step-bar{display:flex;gap:5px;margin-bottom:1.25rem}
.step{flex:1;height:4px;border-radius:2px;background:#e5e5e0}
.step.done{background:#1A6FC4}.step.active{background:#6BA8E5}
.golpe-item{background:#f9f9f7;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #eee}
.golpe-num{font-size:13px;font-weight:600;color:#888}
.golpe-info{font-size:13px;color:#333}
.del-btn{font-size:13px;color:#E24B4A;cursor:pointer;border:none;background:none;padding:4px 8px;font-weight:600}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #f0f0ed}
.sum-row:last-child{border-bottom:none}
.sum-lbl{color:#888}.sum-val{font-weight:600;color:#111}
.picker-wrap{position:relative;margin-top:4px}
.picker-search{width:100%;font-size:16px;padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#f9f9f7;color:#111}
.picker-search:focus{outline:none;border-color:#1A6FC4;background:#fff}
.picker-list{max-height:220px;overflow-y:auto;border:1px solid #ddd;border-radius:10px;background:#fff;margin-top:4px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.picker-item{padding:11px 14px;font-size:14px;cursor:pointer;color:#111;border-bottom:1px solid #f5f5f0}
.picker-item:last-child{border-bottom:none}
.picker-item:active{background:#f0f0ed}
.picker-item.selected{background:#E1F5EE;color:#085041;font-weight:600}
.picker-selected{margin-top:6px;padding:8px 12px;background:#E1F5EE;border-radius:10px;font-size:13px;color:#085041;font-weight:600;display:none}
.badge-dims{margin-top:8px;padding:9px 12px;background:#f5f5f0;border-radius:10px;font-size:13px;color:#666;display:none;flex-wrap:wrap;gap:4px 12px;border:1px solid #e5e5e0}
.badge-dims b{color:#111}
.offline-banner{background:#E1F5EE;border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#085041;display:none}
#status-bar{position:fixed;top:0;left:0;right:0;text-align:center;font-size:12px;padding:4px;z-index:1000;display:none}
#status-bar.offline{background:#C0392B;color:#fff;display:block}
#status-bar.online{background:#1A6FC4;color:#fff;display:block}
</style>
</head>
<body>

<div id="status-bar"></div>

<div class="app">

<div class="screen active" id="s1">
  <div class="step-bar"><div class="step active"></div><div class="step"></div><div class="step"></div><div class="step"></div></div>
  <div class="card">
    <div class="header">
      <div class="hicon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg></div>
      <div><h2>Informações do projeto</h2><p>Passo 1 de 4</p></div>
    </div>
    <label>Nome do projeto</label><input type="text" id="in_projeto" autocomplete="off">
    <label>Cidade</label><input type="text" id="in_cidade" autocomplete="off">
    <label>Nome da estaca</label><input type="text" id="in_estaca" autocomplete="off">
    <label>Data do serviço</label>
    <div class="row3"><select id="in_dia"></select><select id="in_mes"></select><select id="in_ano"></select></div>
    <label>Hora do serviço</label>
    <div class="row"><select id="in_hora"></select><select id="in_min"></select></div>
    <button class="btn btn-primary" onclick="irParaS2()">Continuar →</button>
  </div>
</div>

<div class="screen" id="s2">
  <div class="step-bar"><div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div></div>
  <div class="card">
    <div class="header">
      <div class="hicon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
      <div><h2>Tipo de estaca</h2><p>Passo 2 de 4</p></div>
    </div>
    <label>Tipo de estaca</label>
    <select id="in_tipo" onchange="onTipoChange()">
      <option>Hélice Contínua</option><option>Metálica</option>
      <option>Pré-Moldada de Concreto</option><option>Raiz</option>
      <option>Trado Mecanizado</option><option>Trilho</option><option>Tubulão</option>
    </select>
    <div id="bloco_circ">
      <label>Diâmetro (cm)</label><input type="number" id="in_diam" inputmode="decimal" oninput="calcCirc()">
      <div id="bdg_circ" class="badge-dims"></div>
    </div>
    <div id="bloco_met" style="display:none">
      <label>Buscar perfil da tabela</label>
      <div class="picker-wrap">
        <input class="picker-search" id="srch_met" placeholder="Digite para filtrar..." oninput="filtrarLista('met')" onfocus="abrirLista('met')">
        <div class="picker-list" id="list_met" style="display:none"></div>
      </div>
      <div id="sel_met_nome" class="picker-selected"></div>
      <div id="bdg_met" class="badge-dims"></div>
      <div class="sep">ou preencher manualmente</div>
      <div class="row"><div><label>d (mm)</label><input type="number" inputmode="decimal" id="m_d"></div><div><label>bf (mm)</label><input type="number" inputmode="decimal" id="m_bf"></div></div>
      <div class="row"><div><label>tw (mm)</label><input type="number" inputmode="decimal" id="m_tw"></div><div><label>tf (mm)</label><input type="number" inputmode="decimal" id="m_tf"></div></div>
      <div class="row"><div><label>h (mm)</label><input type="number" inputmode="decimal" id="m_h"></div><div><label>Massa linear (kg/m)</label><input type="number" inputmode="decimal" id="m_massa"></div></div>
      <div class="row"><div><label>Área (cm²)</label><input type="number" inputmode="decimal" id="m_area"></div><div><label>Perímetro (cm)</label><input type="number" inputmode="decimal" id="m_perim"></div></div>
    </div>
    <div id="bloco_tri" style="display:none">
      <label>Buscar trilho da tabela</label>
      <div class="picker-wrap">
        <input class="picker-search" id="srch_tri" placeholder="Digite para filtrar..." oninput="filtrarLista('tri')" onfocus="abrirLista('tri')">
        <div class="picker-list" id="list_tri" style="display:none"></div>
      </div>
      <div id="sel_tri_nome" class="picker-selected"></div>
      <div id="bdg_tri" class="badge-dims"></div>
      <div class="sep">ou preencher manualmente</div>
      <div class="row"><div><label>Área (cm²)</label><input type="number" inputmode="decimal" id="t_area"></div><div><label>Perímetro (cm)</label><input type="number" inputmode="decimal" id="t_perim"></div></div>
      <label>Massa linear (kg/m)</label><input type="number" inputmode="decimal" id="t_massa">
    </div>
    <div id="bloco_pre" style="display:none">
      <label>Buscar perfil da tabela</label>
      <div class="picker-wrap">
        <input class="picker-search" id="srch_pre" placeholder="Digite para filtrar..." oninput="filtrarLista('pre')" onfocus="abrirLista('pre')">
        <div class="picker-list" id="list_pre" style="display:none"></div>
      </div>
      <div id="sel_pre_nome" class="picker-selected"></div>
      <div id="bdg_pre" class="badge-dims"></div>
      <div class="sep">ou preencher manualmente</div>
      <div class="row"><div><label>D externo (cm)</label><input type="number" inputmode="decimal" id="p_dext"></div><div><label>D interno (cm)</label><input type="number" inputmode="decimal" id="p_dint"></div></div>
      <div class="row"><div><label>Área (cm²)</label><input type="number" inputmode="decimal" id="p_area"></div><div><label>Perímetro (cm)</label><input type="number" inputmode="decimal" id="p_perim"></div></div>
    </div>
    <div style="height:0.5px;background:#eee;margin:16px 0"></div>
    <label>Comprimento útil (m)</label><input type="text" inputmode="decimal" id="in_comp">
    <div class="row">
      <div><label>Carga de trabalho (tf)</label><input type="text" inputmode="decimal" id="in_carga" oninput="calcEnsaio()"></div>
      <div><label>Carga de ensaio (tf)</label><input type="text" inputmode="decimal" id="in_cens"><div class="hint">Auto: 2× trabalho</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" onclick="irPara('s1')" style="flex:1;margin-top:0">← Voltar</button>
      <button class="btn btn-primary" onclick="irParaGolpes()" style="flex:2;margin-top:0">Continuar →</button>
    </div>
  </div>
</div>

<div class="screen" id="s3">
  <div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step active"></div><div class="step"></div></div>
  <div class="card">
    <div class="header">
      <div class="hicon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <div><h2>Registrar golpe</h2><p id="golpe_ctr">Passo 3 de 4 · Golpe 1</p></div>
    </div>
    <div class="row">
      <div><label>Altura de queda (cm)</label><input type="text" inputmode="decimal" id="in_alt"></div>
      <div><label>Nega (mm)</label><input type="text" inputmode="decimal" id="in_nega"></div>
    </div>
    <div class="row">
      <div><label>EMX (tn.m)</label><input type="text" inputmode="decimal" id="in_emx"></div>
      <div><label>RMX (tn)</label><input type="text" inputmode="decimal" id="in_rmx"></div>
    </div>
    <label>DMX (mm)</label><input type="text" inputmode="decimal" id="in_dmx">
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" onclick="irPara('s2')" style="flex:1;margin-top:0">← Voltar</button>
      <button class="btn btn-primary" onclick="addGolpe()" style="flex:2;margin-top:0">+ Adicionar golpe</button>
    </div>
    <button class="btn btn-secondary" onclick="irParaResumo()" style="margin-top:8px">Ver resumo →</button>
  </div>
</div>

<div class="screen" id="s4">
  <div class="step-bar"><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step active"></div></div>
  <div class="card">
    <div class="header">
      <div class="hicon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div><h2 id="res_titulo">Resumo</h2><p id="res_sub"></p></div>
    </div>
    <div id="res_dados"></div>
    <div style="margin:1rem 0 .5rem;font-size:13px;font-weight:600;color:#888">Golpes registrados</div>
    <div id="res_golpes"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-excel" onclick="expXLSX()" style="flex:1;margin-top:0">⬇ Excel</button>
      <button class="btn btn-pdf" onclick="expPDF()" style="flex:1;margin-top:0">⬇ PDF</button>
    </div>
    <button class="btn btn-secondary" onclick="novoReg()" style="margin-top:8px">+ Novo registro</button>
  </div>
</div>

</div>

<!-- XLSX library inline -->

}

  var arr=DB_MAP[tipo],f=(filtro||"").toLowerCase();
  var list=document.getElementById("list_"+tipo);
  var itens=arr.filter(function(x){return x.nome.toLowerCase().indexOf(f)>=0;});
  if(!itens.length){list.innerHTML="<div class=\"picker-item\" style=\"color:#aaa\">Nenhum resultado</div>";return;}
  var cur=(tipo==="met"&&selMet)?selMet.nome:(tipo==="tri"&&selTri)?selTri.nome:(tipo==="pre"&&selPre)?selPre.nome:"";
  list.innerHTML=itens.map(function(x){
    return "<div class=\"picker-item"+(cur===x.nome?" selected":"")+"\" onclick=\"selecionarItem('"+tipo+"','"+x.nome.replace(/\\/g,"\\\\").replace(/'/g,"\\'")+"')\">"+x.nome+"</div>";
  }).join("");
}
function abrirLista(t){renderLista(t,gv("srch_"+t));show("list_"+t,true);}
function filtrarLista(t){renderLista(t,gv("srch_"+t));show("list_"+t,true);}

function selecionarItem(tipo,nome){
  show("list_"+tipo,false);
  if(tipo==="met"){
    var p=MET.find(function(x){return x.nome===nome;});if(!p)return;
    selMet=p;sv("srch_met",nome);
    document.getElementById("sel_met_nome").textContent=nome;show("sel_met_nome",true);
    sv("m_d",p.d_mm);sv("m_bf",p.bf_mm);sv("m_tw",p.tw_mm);sv("m_tf",p.tf_mm);
    sv("m_h",p.h_mm);sv("m_massa",p.massa);sv("m_area",p.area_cm2);sv("m_perim",p.perimetro_cm);
    var pts=[];if(p.area_cm2)pts.push("Área: "+p.area_cm2+" cm²");if(p.perimetro_cm)pts.push("Per.: "+p.perimetro_cm+" cm");if(p.massa)pts.push("Massa: "+p.massa+" kg/m");
    var b=document.getElementById("bdg_met");if(pts.length){b.style.display="flex";b.innerHTML="<b>"+pts.join("</b> &nbsp;·&nbsp; <b>")+"</b>";}
  } else if(tipo==="tri"){
    var p=TRI.find(function(x){return x.nome===nome;});if(!p)return;
    selTri=p;sv("srch_tri",nome);
    document.getElementById("sel_tri_nome").textContent=nome;show("sel_tri_nome",true);
    sv("t_area",p.area_cm2);sv("t_perim",p.perimetro_cm);sv("t_massa",p.massa);
    var pts=[];if(p.massa)pts.push("Massa: "+p.massa+" kg/m");if(p.area_cm2)pts.push("Área: "+p.area_cm2+" cm²");if(p.perimetro_cm)pts.push("Per.: "+p.perimetro_cm+" cm");
    var b=document.getElementById("bdg_tri");if(pts.length){b.style.display="flex";b.innerHTML="<b>"+pts.join("</b> &nbsp;·&nbsp; <b>")+"</b>";}else b.style.display="none";
  } else {
    var p=PRE.find(function(x){return x.nome===nome;});if(!p)return;
    selPre=p;sv("srch_pre",nome);
    document.getElementById("sel_pre_nome").textContent=nome;show("sel_pre_nome",true);
    sv("p_dext",p.dext_cm);sv("p_dint",p.dint_cm);sv("p_area",p.area_cm2);sv("p_perim",p.perimetro_cm);
    var pts=[];if(p.dext_cm)pts.push("D ext: "+p.dext_cm+" cm");if(p.dint_cm)pts.push("D int: "+p.dint_cm+" cm");if(p.area_cm2)pts.push("Área: "+p.area_cm2+" cm²");if(p.perimetro_cm)pts.push("Per.: "+p.perimetro_cm+" cm");
    var b=document.getElementById("bdg_pre");if(pts.length){b.style.display="flex";b.innerHTML="<b>"+pts.join("</b> &nbsp;·&nbsp; <b>")+"</b>";}
  }
}

document.addEventListener("click",function(e){
  ["met","tri","pre"].forEach(function(t){
    var w=document.getElementById("list_"+t),i=document.getElementById("srch_"+t);
    if(w&&i&&!w.contains(e.target)&&e.target!==i)w.style.display="none";
  });
});

function irPara(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
function irParaS2(){dados.projeto=gv("in_projeto");dados.cidade=gv("in_cidade");dados.estaca=gv("in_estaca");dados.data=gv("in_dia")+"/"+gv("in_mes")+"/"+gv("in_ano");dados.hora=gv("in_hora")+":"+gv("in_min");irPara("s2");}
function onTipoChange(){
  var t=document.getElementById("in_tipo").value,circ=["Hélice Contínua","Raiz","Trado Mecanizado","Tubulão"];
  show("bloco_circ",circ.indexOf(t)>=0);show("bloco_met",t==="Metálica");show("bloco_tri",t==="Trilho");show("bloco_pre",t==="Pré-Moldada de Concreto");
}
function irParaGolpes(){
  dados.tipo=document.getElementById("in_tipo").value;
  dados.comp=gv("in_comp");
  dados.carga=gv("in_carga");
  dados.cens=gv("in_cens");
  golpes=[];atualizaCtr();irPara("s3");
}
function calcCirc(){
  var d=parseFloat(gv("in_diam").replace(",",".")),b=document.getElementById("bdg_circ");
  if(d>0){b.style.display="flex";b.innerHTML="<b>Área: "+(Math.PI*d/2*d/2).toFixed(2)+" cm²</b> &nbsp;·&nbsp; <b>Per.: "+(Math.PI*d).toFixed(2)+" cm</b>";}
  else b.style.display="none";
}
function calcEnsaio(){
  var c=parseFloat(gv("in_carga").replace(",","."));
  if(c>0)sv("in_cens",(c*2).toFixed(2));
}
function atualizaCtr(){document.getElementById("golpe_ctr").textContent="Passo 3 de 4 · Golpe "+(golpes.length+1);}

function getDims(){
  var t=dados.tipo,o={};
  if(["Hélice Contínua","Raiz","Trado Mecanizado","Tubulão"].indexOf(t)>=0){
    var d=gv("in_diam");if(d){o["Diametro [cm]"]=d;o["Area [cm2]"]=(Math.PI*(+d/2)*(+d/2)).toFixed(2);o["Perimetro [cm]"]=(Math.PI*+d).toFixed(2);}
  } else if(t==="Metálica"){
    if(selMet)o["Perfil"]=selMet.nome;
    [["m_d","d [mm]"],["m_bf","bf [mm]"],["m_tw","tw [mm]"],["m_tf","tf [mm]"],["m_h","h [mm]"],["m_massa","Massa Linear [kg/m]"],["m_area","Area [cm2]"],["m_perim","Perimetro [cm]"]].forEach(function(f){var v=gv(f[0]);if(v)o[f[1]]=v;});
  } else if(t==="Trilho"){
    if(selTri)o["Trilho"]=selTri.nome;
    [["t_area","Area [cm2]"],["t_perim","Perimetro [cm]"],["t_massa","Massa Linear [kg/m]"]].forEach(function(f){var v=gv(f[0]);if(v)o[f[1]]=v;});
  } else if(t==="Pré-Moldada de Concreto"){
    if(selPre)o["Perfil"]=selPre.nome;
    [["p_dext","D Externo [cm]"],["p_dint","D Interno [cm]"],["p_area","Area [cm2]"],["p_perim","Perimetro [cm]"]].forEach(function(f){var v=gv(f[0]);if(v)o[f[1]]=v;});
  }
  return o;
}

function addGolpe(){
  var g=Object.assign({"Projeto":dados.projeto,"Cidade":dados.cidade,"Estaca":dados.estaca,"Tipo Estaca":dados.tipo,"Data":dados.data,"Hora":dados.hora,"Comp. Util [m]":dados.comp,"Carga Trab. [tf]":dados.carga,"Carga Ensaio [tf]":dados.cens,"Alt. Queda [cm]":gv("in_alt"),"Nega [mm]":gv("in_nega"),"EMX [tn.m]":gv("in_emx"),"RMX [tn]":gv("in_rmx"),"DMX [mm]":gv("in_dmx")},getDims());
  golpes.push(g);
  ["in_alt","in_nega","in_emx","in_rmx","in_dmx"].forEach(function(id){sv(id,"");});
  atualizaCtr();toast("Golpe "+golpes.length+" adicionado","#1A6FC4");
}

function irParaResumo(){
  if(!golpes.length){toast("Adicione pelo menos um golpe","#E24B4A");return;}
  document.getElementById("res_titulo").textContent=(dados.projeto||"Sem nome")+" · "+(dados.estaca||"Sem estaca");
  document.getElementById("res_sub").textContent=golpes.length+" golpe(s) · "+(dados.cidade?dados.cidade+" · ":"")+dados.data+" "+dados.hora;
  var rows=[["Projeto",dados.projeto||"—"],["Cidade",dados.cidade||"—"],["Estaca",dados.estaca||"—"],["Tipo",dados.tipo],["Comp. Útil",dados.comp?(dados.comp+" m"):"—"],["Carga Trab.",dados.carga?(dados.carga+" tf"):"—"],["Carga Ensaio",dados.cens?(dados.cens+" tf"):"—"],["Data",dados.data],["Hora",dados.hora]];
  document.getElementById("res_dados").innerHTML="<div class=\"card\" style=\"margin-bottom:.75rem\">"+rows.map(function(r){return"<div class=\"sum-row\"><span class=\"sum-lbl\">"+r[0]+"</span><span class=\"sum-val\">"+r[1]+"</span></div>";}).join("")+"</div>";
  document.getElementById("res_golpes").innerHTML=golpes.map(function(g,i){
    var info=[g["Alt. Queda [cm]"]?"Alt: "+g["Alt. Queda [cm]"]+"cm":"",g["Nega [mm]"]?"Nega: "+g["Nega [mm]"]+"mm":"",g["EMX [tn.m]"]?"EMX: "+g["EMX [tn.m]"]:""].filter(Boolean).join(" · ")||"—";
    return"<div class=\"golpe-item\"><div><div class=\"golpe-num\">Golpe "+(i+1)+"</div><div class=\"golpe-info\">"+info+"</div></div><button class=\"del-btn\" onclick=\"remGolpe("+i+")\">✕</button></div>";
  }).join("");
  irPara("s4");
}
function remGolpe(i){golpes.splice(i,1);irParaResumo();}
function nomeArq(ext){return(dados.projeto||"projeto")+"_"+(dados.estaca||"estaca")+"_"+dados.data.replace(/\//g,"")+"."+ext;}

function expXLSX(){
  if(!golpes.length){toast("Sem golpes","#E24B4A");return;}
  if(typeof XLSX==="undefined"){toast("Biblioteca Excel não carregada. Verifique conexão.","#E24B4A");return;}
  var ws=XLSX.utils.json_to_sheet(golpes),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Golpes");
  ws["!cols"]=Object.keys(golpes[0]).map(function(k){return{wch:Math.max(k.length,Math.max.apply(null,golpes.map(function(g){return String(g[k]||"").length;})))+2};});
  XLSX.writeFile(wb,nomeArq("xlsx"));toast("Excel salvo!","#217346");
}

function expPDF(){
  if(!golpes.length){toast("Sem golpes","#E24B4A");return;}
  if(typeof window.jspdf==="undefined"){toast("Biblioteca PDF não carregada. Verifique conexão.","#E24B4A");return;}
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  var W=doc.internal.pageSize.getWidth();
  doc.setFillColor(26,111,196);doc.rect(0,0,W,20,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont("helvetica","bold");
  doc.text("REGISTRO DE CAMPO METODO CASE - PDA",W/2,8,{align:"center"});
  doc.setFontSize(9);doc.setFont("helvetica","normal");
  var l2=[(dados.projeto||"—"),(dados.cidade?"| "+dados.cidade:""),"| Estaca: "+(dados.estaca||"—"),"| "+dados.tipo,"| "+dados.data+" "+dados.hora].filter(Boolean).join(" ");
  doc.text(l2,W/2,14,{align:"center"});
  var g0=golpes[0];
  var dimKeys=["Diametro [cm]","Area [cm2]","Perimetro [cm]","Perfil","Trilho","d [mm]","bf [mm]","tw [mm]","tf [mm]","h [mm]","Massa Linear [kg/m]","D Externo [cm]","D Interno [cm]"];
  var dp=[];dimKeys.forEach(function(k){if(g0[k])dp.push(k+": "+g0[k]);});
  if(dp.length){doc.setTextColor(60,60,60);doc.setFontSize(8);doc.setFont("helvetica","normal");doc.text(dp.join("   "),14,26);}
  // linha extra com dados fixos da estaca
  var fixos=[];
  if(dados.comp)fixos.push("Comp. Útil: "+dados.comp+" m");
  if(dados.carga)fixos.push("Carga Trab.: "+dados.carga+" tf");
  if(dados.cens)fixos.push("Carga Ensaio: "+dados.cens+" tf");
  if(fixos.length){doc.setTextColor(60,60,60);doc.setFontSize(8);doc.text(fixos.join("   "),14,dp.length?31:26);}
  var startY=(dp.length&&fixos.length)?36:(dp.length||fixos.length)?31:23;
  var cm=[["#","#"],["Alt. Queda [cm]","Alt.\nQueda (cm)"],["Nega [mm]","Nega\n(mm)"],["EMX [tn.m]","EMX\n(tn.m)"],["RMX [tn]","RMX\n(tn)"],["DMX [mm]","DMX\n(mm)"]];
  var head=[cm.map(function(c){return c[1];})];
  var body=golpes.map(function(g,i){return cm.map(function(c){return c[0]==="#"?String(i+1):String(g[c[0]]||"");});});
  doc.autoTable({head:head,body:body,startY:startY,styles:{fontSize:8,cellPadding:2,halign:"center",valign:"middle"},headStyles:{fillColor:[26,111,196],textColor:255,fontStyle:"bold",halign:"center"},alternateRowStyles:{fillColor:[240,250,245]},margin:{left:14,right:14},didDrawPage:function(){var pg=doc.internal.getCurrentPageInfo().pageNumber,tot=doc.internal.getNumberOfPages();doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text("Pagina "+pg+"/"+tot+"  |  "+new Date().toLocaleString("pt-BR"),W/2,doc.internal.pageSize.getHeight()-4,{align:"center"});}});
  doc.save(nomeArq("pdf"));toast("PDF salvo!","#C0392B");
}

function novoReg(){
  golpes=[];dados={};selMet=null;selTri=null;selPre=null;
  ["in_projeto","in_cidade","in_estaca","in_comp","in_carga","in_cens","in_alt","in_nega","in_emx","in_rmx","in_dmx","in_diam","srch_met","srch_tri","srch_pre","m_d","m_bf","m_tw","m_tf","m_h","m_massa","m_area","m_perim","t_area","t_perim","t_massa","p_dext","p_dint","p_area","p_perim"].forEach(function(id){sv(id,"");});
  ["bdg_met","bdg_tri","bdg_pre","bdg_circ","sel_met_nome","sel_tri_nome","sel_pre_nome"].forEach(function(id){show(id,false);});
  irPara("s1");
}

function toast(msg,bg){
  var fb=document.createElement("div");
  fb.style.cssText="position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:"+bg+";color:white;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)";
  fb.textContent=msg;document.body.appendChild(fb);setTimeout(function(){fb.remove();},2500);
}

// Status online/offline
function updateStatus(){
  var bar=document.getElementById("status-bar");
  if(navigator.onLine){bar.textContent="Online";bar.className="online";setTimeout(function(){bar.style.display="none";},2000);}
  else{bar.textContent="Offline — app funcionando localmente";bar.className="offline";}
}
window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);

// Service Worker para cache offline
if("serviceWorker" in navigator){
  var swCode = `
const CACHE = "pda-v1";
const URLS = [
  "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"
];
self.addEventListener("install", e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting()));
});
self.addEventListener("activate", e => {
  e.waitUntil(clients.claim());
});
self.addEventListener("fetch", e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      if(res && res.status === 200) {
        var clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return res;
    }).catch(() => caches.match(e.request)))
  );
});`;
  var blob=new Blob([swCode],{type:"application/javascript"});
  var swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

initDatas();
onTipoChange();
</script>
